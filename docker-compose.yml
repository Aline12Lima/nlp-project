services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./models:/app/models
      - ./chroma_data:/app/chroma_data
    environment:
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - DATABASE_URL=postgresql://nlp_user:nlp_pass@postgres:5432/nlp_db
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=nlp_user
      - POSTGRES_PASSWORD=nlp_pass
      - POSTGRES_DB=nlp_db
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - ./redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes